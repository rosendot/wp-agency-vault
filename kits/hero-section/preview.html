<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section Preview</title>
    <link rel="stylesheet" href="hero.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .hero {
            background: linear-gradient(rgba(26, 18, 8, 0.65), rgba(26, 18, 8, 0.65)),
                        linear-gradient(135deg, #8B6914 0%, #5a3e0a 50%, #3d2a06 100%);
        }
        .hero__title {
            font-family: Georgia, 'Times New Roman', serif;
        }
        .hero__label {
            color: #d4a017;
        }
        .btn {
            display: inline-block;
            padding: 0.9rem 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn--primary {
            background: #b42318;
            color: #fff;
            border: 2px solid #b42318;
        }
        .btn--primary:hover {
            background: #8b1a12;
            border-color: #8b1a12;
        }
        .btn--outline {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        .btn--outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }
        .after-hero {
            padding: 3rem 2rem;
            text-align: center;
            background: #faf6f0;
            color: #888;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero__content">
            <p class="hero__label">Welcome to</p>
            <h1 class="hero__title">Your City's Home for<br>Authentic Cuisine</h1>
            <p class="hero__text">Bold flavors and family tradition — every dish is crafted with recipes passed down through generations. Made fresh, served with love.</p>
            <div class="hero__buttons">
                <a href="#" class="btn btn--primary">View Menu</a>
                <a href="#" class="btn btn--outline">Our Story</a>
            </div>
        </div>
    </section>

    <div class="after-hero">
        <p>Content continues below the hero...</p>
    </div>

</body>
</html>
