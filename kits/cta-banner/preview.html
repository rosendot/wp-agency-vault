<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA Banner Preview</title>
    <link rel="stylesheet" href="cta-banner.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf6f0; color: #2c2416; }
        .cta-banner__inner { background: #b42318; color: #fff; }
        .cta-banner__title { font-family: Georgia, serif; }
        .cta-banner__btn--primary { background: #fff; color: #b42318; }
        .cta-banner__btn--secondary { color: #fff; border-color: rgba(255,255,255,0.5); }
        .cta-banner__btn--secondary:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <section class="cta-banner">
        <div class="cta-banner__inner">
            <div class="cta-banner__content">
                <h2 class="cta-banner__title">Ready to ship faster?</h2>
                <p class="cta-banner__subtitle">Get a custom site built by people who actually maintain it afterward.</p>
            </div>
            <div class="cta-banner__actions">
                <a class="cta-banner__btn cta-banner__btn--primary" href="#">Start a project</a>
                <a class="cta-banner__btn cta-banner__btn--secondary" href="#">Book a call</a>
            </div>
        </div>
    </section>
</body>
</html>
