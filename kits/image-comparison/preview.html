<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Comparison Preview</title>
    <link rel="stylesheet" href="image-comparison.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf6f0; }
        .img-comparison__title { font-family: Georgia, 'Times New Roman', serif; color: #1a1208; }
        .img-comparison__caption { color: #6b5e4f; background: #f0ebe4; }
        .after-section { padding: 3rem 2rem; text-align: center; color: #888; }
    </style>
</head>
<body>

    <section class="img-comparison">
        <div class="img-comparison__header">
            <h2 class="img-comparison__title">Compare</h2>
        </div>
        <div class="img-comparison__grid">
            <div class="img-comparison__pair">
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #a89880;">Before</div>
                    <span class="img-comparison__label">Before</span>
                </div>
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #c4b5a0;">After</div>
                    <span class="img-comparison__label">After</span>
                </div>
                <div class="img-comparison__caption">Kitchen renovation — full remodel</div>
            </div>
            <div class="img-comparison__pair">
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #8a7a68;">Before</div>
                    <span class="img-comparison__label">Before</span>
                </div>
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #b8a892;">After</div>
                    <span class="img-comparison__label">After</span>
                </div>
                <div class="img-comparison__caption">Bathroom refresh — tile and vanity</div>
            </div>
            <div class="img-comparison__pair">
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #9a8a78;">Option A</div>
                    <span class="img-comparison__label">Option A</span>
                </div>
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #d0c0aa;">Option B</div>
                    <span class="img-comparison__label">Option B</span>
                </div>
                <div class="img-comparison__caption">Exterior paint — warm vs cool</div>
            </div>
            <div class="img-comparison__pair">
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #b0a090;">Standard</div>
                    <span class="img-comparison__label">Standard</span>
                </div>
                <div class="img-comparison__side">
                    <div class="img-comparison__placeholder" style="background: #c8b89e;">Premium</div>
                    <span class="img-comparison__label">Premium</span>
                </div>
                <div class="img-comparison__caption">Countertop finish comparison</div>
            </div>
        </div>
    </section>

    <div class="after-section"><p>Content continues below...</p></div>
</body>
</html>
