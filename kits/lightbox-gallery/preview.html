<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Gallery Preview</title>
    <link rel="stylesheet" href="lightbox-gallery.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf6f0; }
        .lightbox-gallery__title { font-family: Georgia, 'Times New Roman', serif; color: #1a1208; }
        .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #8a8279; }
        .after-gallery { padding: 3rem 2rem; text-align: center; color: #888; }
    </style>
</head>
<body>

    <section class="lightbox-gallery">
        <div class="lightbox-gallery__header">
            <h2 class="lightbox-gallery__title">Gallery</h2>
        </div>
        <div class="lightbox-gallery__grid">
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#c4b5a0;">1</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#b8a892;">2</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#d4c5b0;">3</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#a89880;">4</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#c0b09a;">5</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#baa88e;">6</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#d0c0aa;">7</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
            <div class="lightbox-gallery__thumb"><div class="placeholder" style="background:#a49484;">8</div><div class="lightbox-gallery__thumb-overlay"><span class="lightbox-gallery__thumb-icon">&#x26F6;</span></div></div>
        </div>

        <div class="lightbox-modal" role="dialog" aria-label="Image viewer">
            <button class="lightbox-modal__close" aria-label="Close">&times;</button>
            <button class="lightbox-modal__nav lightbox-modal__nav--prev" aria-label="Previous">&#8249;</button>
            <img class="lightbox-modal__img" src="" alt="">
            <button class="lightbox-modal__nav lightbox-modal__nav--next" aria-label="Next">&#8250;</button>
            <div class="lightbox-modal__counter"></div>
        </div>
    </section>

    <div class="after-gallery"><p>Content continues below the gallery...</p></div>
    <script src="lightbox-gallery.js"></script>
</body>
</html>
