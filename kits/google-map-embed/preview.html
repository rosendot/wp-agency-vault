<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Map Embed Preview</title>
    <link rel="stylesheet" href="map.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1208;
            color: #faf6f0;
        }
        .section { padding: 4rem 2rem; }
        .section__header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .section__title {
            font-family: Georgia, serif;
            font-size: 2.5rem;
            color: #d4a017;
        }
        .visit-us__detail h3 {
            color: #d4a017;
        }
        .visit-us__detail p {
            color: rgba(250, 246, 240, 0.75);
        }
        .map-placeholder {
            width: 100%;
            min-height: 350px;
            background: #2a2218;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a7e6e;
            font-style: italic;
            border: 1px dashed #555;
        }
    </style>
</head>
<body>

    <section class="section">
        <div class="section__header">
            <h2 class="section__title">Visit Us</h2>
        </div>
        <div class="visit-us__grid">
            <div class="visit-us__map">
                <div class="map-placeholder">Google Maps embed goes here</div>
            </div>
            <div class="visit-us__info">
                <div class="visit-us__detail">
                    <h3>Location</h3>
                    <p>123 Main Street<br>City, ST 00000</p>
                </div>
                <div class="visit-us__detail">
                    <h3>Hours</h3>
                    <p>Monday &ndash; Friday: 11am &ndash; 10pm<br>Saturday &ndash; Sunday: 10am &ndash; 11pm</p>
                </div>
                <div class="visit-us__detail">
                    <h3>Contact</h3>
                    <p>(555) 000-0000<br>hello@example.com</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
