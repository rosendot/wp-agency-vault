<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masonry Gallery Preview</title>
    <link rel="stylesheet" href="masonry-gallery.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #faf6f0; }
        .masonry-gallery__title { font-family: Georgia, 'Times New Roman', serif; color: #1a1208; }
        .after-gallery { padding: 3rem 2rem; text-align: center; color: #888; }
    </style>
</head>
<body>

    <section class="masonry-gallery">
        <div class="masonry-gallery__header">
            <h2 class="masonry-gallery__title">Gallery</h2>
        </div>
        <div class="masonry-gallery__grid">
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #c4b5a0; height: 280px;">1</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #b8a892; height: 200px;">2</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #d4c5b0; height: 320px;">3</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #a89880; height: 240px;">4</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #c0b09a; height: 180px;">5</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #baa88e; height: 300px;">6</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #d0c0aa; height: 220px;">7</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #a49484; height: 260px;">8</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #c8b89e; height: 340px;">9</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #b4a490; height: 190px;">10</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #c0b098; height: 270px;">11</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
            <div class="masonry-gallery__item">
                <div class="masonry-gallery__placeholder" style="background: #a89078; height: 230px;">12</div>
                <div class="masonry-gallery__overlay"><span class="masonry-gallery__icon">+</span></div>
            </div>
        </div>
    </section>

    <div class="after-gallery">
        <p>Content continues below the gallery...</p>
    </div>

</body>
</html>
